version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: real_time_price
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+psycopg2://postgres:postgres@db:5432/real_time_price"
      SECRET_KEY: "${SECRET_KEY:-change-me-in-production}"
      CORS_ORIGINS: "http://localhost,http://localhost:80,http://localhost:5173"
      FRONTEND_URL: "http://localhost"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      EMAIL_FROM: "${EMAIL_FROM:-noreply@pricetracker.dev}"
      PRICE_CHECK_HOUR: "8"
      PRICE_CHECK_MINUTE: "0"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      BACKEND_URL: "http://backend:8000"

volumes:
  pgdata:
